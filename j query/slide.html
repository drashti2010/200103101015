<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
        $(document).ready(function(){
            $(".down").click(function(){
                $(".box").slideDown(1000);
            })
            $("#up").click(function(){
                $(".box").slideUp(1000);
            })
            $("#toggle").click(function(){
                $(".box").slideToggle(1000);
            })
        })
    </script>
</head>
<body>
    <button class="down">slide down</button>
    <hr>
    <button id="up">slideup</button>
    <hr>
    <button id="toggle">slide toggle</button>
    <hr>
    <div class="box">Lorem ipsum dolor sit amet consectetur adipisicing elit. Reiciendis odit iusto dicta iste animi aut, quos sapiente, natus amet ut tempore alias, fuga ipsam pariatur esse nobis! Earum commodi dicta eos quis?</div>
</body>
</html>
